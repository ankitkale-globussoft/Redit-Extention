<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reddit Scraper Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="premium-theme">
  <div class="glass-container">
    <header>
      <div class="header-row">
        <h1>Reddit Scraper</h1>
        <button id="close-panel-btn" class="close-btn" title="Close Panel">×</button>
      </div>
      <p class="subtitle">Deep Scrape Reddit Community Data</p>
    </header>
    
    <main>
      <div class="input-card">
        <div class="label-row">
          <label for="community-urls">Batch URLs (One per line)</label>
          <button id="import-file-btn" class="mini-btn">Import File</button>
          <input type="file" id="file-input" accept=".txt,.csv" hidden />
        </div>
        <textarea id="community-urls" placeholder="https://www.reddit.com/r/..." rows="3"></textarea>
        <div class="toggle-row">
          <input type="checkbox" id="load-extra" checked>
          <label for="load-extra">Auto-scroll listing (5 scrolls)</label>
        </div>
      </div>

      <div class="status-card">
        <p id="status-text">Ready to scrape</p>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="metrics-row">
          <div class="metric-item">
            <span class="metric-val" id="post-count">0</span>
            <span class="metric-label">Posts</span>
          </div>
          <div class="metric-item">
            <span class="metric-val" id="comment-count">0</span>
            <span class="metric-label">Comments</span>
          </div>
          <div class="metric-item">
            <span class="metric-val" id="reply-count">0</span>
            <span class="metric-label">Replies</span>
          </div>
        </div>
      </div>

      <div class="action-btns">
        <button id="scrape-btn" class="primary-btn">
          <span class="btn-text">Start Batch Deep Scrape</span>
          <div class="btn-glow"></div>
        </button>
        <button id="clear-btn" class="secondary-btn" title="Clear All Data">Clear All</button>
      </div>

      <div id="results-container" class="results-card hidden">
        <h3>Scraped Data Preview</h3>
        <div class="table-wrapper">
          <table id="data-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>Author</th>
                <th>Date</th>
                <th>Content Preview</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="download-actions">
        <button id="download-btn" class="secondary-btn" disabled>Export CSV</button>
        <button id="json-btn" class="secondary-btn" disabled>Export JSON</button>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 Antigravity</p>
    </footer>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
      <div class="glass-modal">
        <h3 id="modal-title">Close Scraper?</h3>
        <p id="modal-text">Your current batch and scraped data in the view will be lost.</p>
        <div class="modal-btns">
          <button id="modal-cancel">Keep Working</button>
          <button id="modal-confirm" class="danger-btn">Delete All</button>
        </div>
      </div>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
