<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reddit Scraper Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="glass-container">
    <header>
      <h1>Reddit Scraper</h1>
      <p class="subtitle">Extract data with ease</p>
    </header>
    
    <main>
      <div class="input-card">
        <label for="community-url">Community URL (Subreddit or Profile)</label>
        <input type="text" id="community-url" placeholder="https://www.reddit.com/r/..." />
        <div class="toggle-row">
          <input type="checkbox" id="load-extra" checked>
          <label for="load-extra">Load more posts (Auto-scroll)</label>
        </div>
      </div>

      <div class="status-card">
        <p id="status-text">Ready to scrape</p>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <button id="scrape-btn" class="primary-btn">
        <span class="btn-text">Scrape Current / Community</span>
        <div class="btn-glow"></div>
      </button>

      <div class="download-actions">
        <button id="download-btn" class="secondary-btn" disabled>CSV</button>
        <button id="json-btn" class="secondary-btn" disabled>JSON</button>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 Antigravity</p>
    </footer>
  </div>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
